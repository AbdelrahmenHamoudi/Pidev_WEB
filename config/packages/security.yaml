security:
    password_hashers:
        App\Entity\Users:
            id: App\Security\Sha256PasswordHasher

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: e_mail

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall pour l'inscription API (public, pas de sécurité)
        api_register:
            pattern: ^/api/register
            stateless: true
            security: false

        # Firewall pour le test d'envoi d'email (public, temporaire)
        api_test_email:
            pattern: ^/api/test-email
            stateless: true
            security: false

        # Firewall pour les hebergements publics
        api_hebergements:
            pattern: ^/api/hebergements
            stateless: true
            security: false

        # Firewall pour le login API (génère le JWT)
        api_login:
            pattern: ^/api/login
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: e_mail
                password_path: mot_de_pass
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Firewall pour les autres routes API (protégées par JWT)
        api:
            pattern: ^/api
            stateless: true
            security: false
            provider: app_user_provider
            jwt: ~

        # Ton firewall web existant (intact)
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker

            form_login:
                login_path: app_login
                check_path: app_login
                success_handler: App\Security\LoginSuccessHandler

            logout:
                path: app_logout
                target: app_login

    access_control:
    - { path: ^/api/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/register, roles: PUBLIC_ACCESS }
    - { path: ^/api/test-email, roles: PUBLIC_ACCESS }
    - { path: ^/api/hebergements, roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
    - { path: ^/register, roles: PUBLIC_ACCESS }
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/verify-email, roles: PUBLIC_ACCESS }
    - { path: ^/resend-verification, roles: PUBLIC_ACCESS }
    - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
    - { path: ^/reset-password, roles: PUBLIC_ACCESS }
    - { path: ^/account, roles: ROLE_USER }
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/2fa, roles: PUBLIC_ACCESS }
    - { path: ^/face-login, roles: PUBLIC_ACCESS }
    - { path: ^/face-api, roles: PUBLIC_ACCESS }
    - { path: ^/api/ably, roles: IS_AUTHENTICATED_ANONYMOUSLY }
    - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            App\Entity\Users:
                id: App\Security\Sha256PasswordHasher