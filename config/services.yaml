parameters:
    upload_directory: '%kernel.project_dir%/public/uploads/activites'
    uploads_directory: '%kernel.project_dir%/public/uploads'
    profile_images_directory: '%kernel.project_dir%/public/uploads/profiles'
    publication_images_directory: '%kernel.project_dir%/public/uploads/publications'
    qr_coder_api_key: '%env(QRCODER_API_KEY)%'
    api2pdf_key: '%env(API2PDF_KEY)%'
    pusher_key: '%env(PUSHER_KEY)%'
    pusher_cluster: '%env(PUSHER_CLUSTER)%'
    gemini_api_key: '%env(GEMINI_API_KEY)%'
    GROQ_API_KEY: '%env(GROQ_API_KEY)%'
    GEOAPIFY_API_KEY: '%env(GEOAPIFY_API_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false
        bind:
            string $qrCoderApiKey: '%qr_coder_api_key%'
            string $api2pdfKey: '%api2pdf_key%'
            string $geminiApiKey: '%gemini_api_key%'
            $geoapifyKey: '%GEOAPIFY_API_KEY%'
            $projectDir: '%kernel.project_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\ActiviteService:
        arguments:
            $uploadDir: '%upload_directory%'

    App\Service\RecaptchaValidator:
        arguments:
            $secret: '%env(RECAPTCHA_SECRET_KEY)%'

    App\EventListener\RecaptchaRequestListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 100 }

    App\EventListener\TwoFactorListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 50 }

    App\Service\MeteoService:
        arguments:
            $openweatherKey: '%env(OPENWEATHER_API_KEY)%'

    App\Service\VirtualTourService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'
            $projectDir: '%kernel.project_dir%'

    App\Service\Hebergement\DynamicPricingService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Hebergement\SafeZoneService:
        arguments:
            $geoapifyKey: '%env(GEOAPIFY_API_KEY)%'

    App\Service\Hebergement\GroqService: ~

    App\Service\Hebergement\TravelIntelligenceService:
        arguments:
            $rapidApiKey: '%env(RAPIDAPI_KEY)%'

    # Configuration de Messenger Ably
    App\Service\AblyService:
        arguments:
            $apiKey: '%env(ABLY_API_KEY)%'

    # Configuration de ChatBot de Communaute
    App\Service\CommunityChatbotService:
        autowire: true
        autoconfigure: true

    App\Service\CommunauteChatbotService:
        arguments:
            $huggingfaceApiToken: '%env(HUGGINGFACE_API_TOKEN)%'