# This file is the entry point to configure your own services.
# Files in the packages/ directory configure your dependencies.

parameters:
    upload_directory: '%kernel.project_dir%/public/uploads/activite'
    profile_images_directory: '%kernel.project_dir%/public/uploads/profiles'
    publication_images_directory: '%kernel.project_dir%/public/uploads/publications'
    GROQ_API_KEY: '%env(GROQ_API_KEY)%'
    GEOAPIFY_API_KEY: '%env(GEOAPIFY_API_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true
        autoconfigure: true
        public: false
        bind:
            $geoapifyKey: '%GEOAPIFY_API_KEY%'
            $projectDir: '%kernel.project_dir%'

    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Configuration explicite pour ActiviteService
    App\Service\ActiviteService:
        arguments:
            $uploadDir: '%upload_directory%'



    App\Service\Hebergement\DynamicPricingService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Hebergement\SafeZoneService:
        arguments:
            $geoapifyKey: '%env(GEOAPIFY_API_KEY)%'

    App\Service\Hebergement\GroqService: ~

    App\Service\Hebergement\TravelIntelligenceService:
        arguments:
            $rapidApiKey: '%env(RAPIDAPI_KEY)%'
